name: Build React Native Android APK

on:
  push:
    branches:
      - main

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    env:
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          api-level: 36
          build-tools: 36.0.0
          ndk: 27.1.12297006

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('apps/mobile/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache Node modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            apps/mobile/node_modules
            node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json', 'apps/mobile/package.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install root dependencies
        run: npm install --legacy-peer-deps

      - name: Install mobile dependencies
        run: cd apps/mobile && npm install --legacy-peer-deps

      - name: Assemble Android release APK
        run: |
          cd apps/mobile/android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenCut-Native-Beta
          path: apps/mobile/android/app/build/outputs/apk/release/app-release.apk
